name: Publish Package

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --immutable

      - name: Update version from release tag
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ] && [ "${GITHUB_EVENT_NAME}" != "release" ]; then
            echo "This workflow must run from a Git tag or GitHub release so the publish version is explicit."
            exit 1
          fi

          VERSION=${GITHUB_REF_NAME#v}

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Release tag must resolve to a valid semver version, got: $GITHUB_REF_NAME"
            exit 1
          fi

          echo "Publishing version: $VERSION"
          npm pkg set version="$VERSION"

      - name: Run ESLint
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Run type checks
        run: yarn typecheck

      - name: Build package
        run: yarn build

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
